<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>Klave — Chat. Teach. Get paid.</title>
    <meta name="description" content="The chat-first platform for real estate course creators. Sell your courses inside group chats your students already love." />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <link rel="manifest" href="/manifest.json" />

    <meta name="theme-color" content="#5A1DE6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a0d33" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Klave" />
    <meta name="mobile-web-app-capable" content="yes" />

    <meta property="og:title" content="Klave — Chat. Teach. Get paid." />
    <meta property="og:description" content="The chat-first platform for real estate course creators." />
    <meta property="og:image" content="/opengraph.jpg" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://klave-api.onrender.com" crossorigin>
    <link rel="dns-prefetch" href="https://klave-api.onrender.com">
    <link rel="dns-prefetch" href="https://clerk.com">
    <link rel="dns-prefetch" href="https://clerk.accounts.dev">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
      try {
        var t = localStorage.getItem('theme');
        if (t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
